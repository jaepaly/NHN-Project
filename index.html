<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INCANT — 말이 곧 마법이 되는 로그라이크</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #05060f;
        height: 100%;
        overflow: hidden;
        font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
        color: #e8edff;
      }
      #game-root {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
      }
      /* 영창 차징 UX — 캔버스 위 DOM 오버레이 */
      #incant-wrap {
        --spell-core: #8fa4ff;
        --spell-glow: #4c66ff;
        --spell-accent: #ffffff;
        --charge: 0%;
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: end center;
        padding-bottom: clamp(64px, 12vh, 110px);
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition: opacity 160ms ease, visibility 160ms ease;
      }
      #incant-wrap::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 50% 66%, color-mix(in srgb, var(--spell-glow) 22%, transparent), transparent 34%),
          linear-gradient(to bottom, transparent 35%, rgba(3, 5, 16, 0.7));
        backdrop-filter: blur(1.5px) saturate(0.85);
      }
      #incant-wrap.active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      .incant-panel {
        position: relative;
        width: min(650px, calc(100vw - 36px));
        padding: 18px 20px 16px;
        box-sizing: border-box;
        border: 1px solid color-mix(in srgb, var(--spell-core) 64%, transparent);
        border-radius: 16px;
        background: linear-gradient(145deg, rgba(8, 11, 28, 0.97), rgba(13, 18, 45, 0.92));
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.035) inset,
          0 0 32px color-mix(in srgb, var(--spell-glow) 36%, transparent),
          0 22px 70px rgba(0, 0, 0, 0.52);
        overflow: hidden;
      }
      .incant-panel::before {
        content: '';
        position: absolute;
        inset: -80% 38%;
        background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--spell-accent) 16%, transparent), transparent);
        transform: rotate(18deg);
        animation: incant-scan 2.8s linear infinite;
        pointer-events: none;
      }
      .incant-heading,
      .incant-footer {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .incant-kicker {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.22em;
        color: var(--spell-core);
        text-shadow: 0 0 12px var(--spell-glow);
      }
      #incant-state {
        font-size: 12px;
        letter-spacing: 0.08em;
        color: #aeb9e8;
      }
      .incant-input-shell {
        position: relative;
        margin-top: 12px;
      }
      #incant-bar {
        width: 100%;
        box-sizing: border-box;
        padding: 15px 52px 15px 17px;
        font-size: clamp(17px, 2.2vw, 21px);
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #f4f6ff;
        background: rgba(2, 4, 15, 0.72);
        border: 1px solid color-mix(in srgb, var(--spell-core) 55%, #26305b);
        border-radius: 9px;
        outline: none;
        box-shadow: inset 0 0 18px color-mix(in srgb, var(--spell-glow) 12%, transparent);
        caret-color: var(--spell-accent);
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }
      #incant-bar:focus {
        border-color: var(--spell-core);
        box-shadow:
          inset 0 0 18px color-mix(in srgb, var(--spell-glow) 18%, transparent),
          0 0 20px color-mix(in srgb, var(--spell-glow) 28%, transparent);
      }
      #incant-count {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        font: 600 11px/1 'Consolas', monospace;
        color: #6f7bac;
      }
      .incant-charge-track {
        position: relative;
        height: 6px;
        margin: 13px 1px 10px;
        border-radius: 999px;
        background: #151b38;
        overflow: hidden;
      }
      #incant-charge {
        width: var(--charge);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--spell-core), var(--spell-accent));
        box-shadow: 0 0 18px var(--spell-core);
        transition: width 120ms ease-out;
      }
      #incant-hint,
      #incant-charge-label {
        font-size: 12px;
        color: #7f8aba;
      }
      #incant-charge-label {
        color: var(--spell-core);
        font-weight: 700;
        letter-spacing: 0.06em;
      }
      #incant-wrap.judging #incant-bar {
        color: var(--spell-core);
        border-color: var(--spell-core);
        animation: judging-input 800ms ease-in-out infinite alternate;
      }
      #incant-wrap.judging #incant-charge {
        width: 100%;
        animation: judging-charge 1.1s ease-in-out infinite;
      }
      #incant-wrap.judging .incant-panel {
        animation: judging-panel 1.1s ease-in-out infinite alternate;
      }
      @keyframes incant-scan {
        from { transform: translateX(-220%) rotate(18deg); }
        to { transform: translateX(220%) rotate(18deg); }
      }
      @keyframes judging-input {
        to { box-shadow: inset 0 0 24px color-mix(in srgb, var(--spell-glow) 28%, transparent), 0 0 26px color-mix(in srgb, var(--spell-glow) 42%, transparent); }
      }
      @keyframes judging-charge {
        0%, 100% { transform: translateX(-24%); opacity: 0.6; }
        50% { transform: translateX(6%); opacity: 1; }
      }
      @keyframes judging-panel {
        to { border-color: var(--spell-accent); }
      }
      @media (prefers-reduced-motion: reduce) {
        .incant-panel::before,
        #incant-wrap.judging #incant-bar,
        #incant-wrap.judging #incant-charge,
        #incant-wrap.judging .incant-panel { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <div id="incant-wrap" aria-hidden="true">
      <div class="incant-panel">
        <div class="incant-heading">
          <span class="incant-kicker">INCANTATION LINK</span>
          <span id="incant-state">시간 흐름 10%</span>
        </div>
        <div class="incant-input-shell">
          <input id="incant-bar" type="text" autocomplete="off" maxlength="60"
                 aria-label="자유 텍스트 주문"
                 placeholder="당신의 문장을 주문으로…" />
          <span id="incant-count">0/60</span>
        </div>
        <div class="incant-charge-track" aria-hidden="true">
          <div id="incant-charge"></div>
        </div>
        <div class="incant-footer">
          <span id="incant-hint">Enter 발동 · Esc 취소</span>
          <span id="incant-charge-label">공명 대기</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
